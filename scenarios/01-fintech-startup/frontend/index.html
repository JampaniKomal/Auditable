<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Fintech | Internal Employee Portal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; }
        .navbar { background-color: #003366; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 40px; max-width: 800px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        button { background-color: #00509e; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; font-size: 16px; }
        button:hover { background-color: #003366; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; display: none; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <div class="navbar">
        <h2>Delta Fintech</h2>
        <span>Status: Logged In (Admin)</span>
    </div>
    
    <div class="container">
        <div class="card">
            <h3>Employee Data Vault</h3>
            <p>Access highly sensitive employee records. All actions are logged.</p>
            <button onclick="fetchData()">Load Employee PII</button>
            
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>Full Name</th>
                        <th>Aadhaar Number (PII)</th>
                        <th>Stored Password</th>
                    </tr>
                </thead>
                <tbody id="dataBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        // INTENTIONAL FLAW 6: Hardcoded API tokens exposed in client-side source code!
        const API_TOKEN = "MASTER_BACKDOOR_KEY_2026";
        
        async function fetchData() {
            try {
                const response = await fetch('http://localhost:8000/api/users', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${API_TOKEN}`
                    }
                });
                
                if (response.ok) {
                    const result = await response.json();
                    const table = document.getElementById('dataTable');
                    const tbody = document.getElementById('dataBody');
                    tbody.innerHTML = '';
                    
                    result.data.forEach(user => {
                        tbody.innerHTML += `<tr><td>${user.name}</td><td>${user.aadhaar}</td><td>${user.password}</td></tr>`;
                    });
                    
                    table.style.display = 'table';
                } else {
                    alert('Access Denied or Server Error.');
                }
            } catch (error) {
                console.error('Error fetching data:', error);
                alert('Failed to connect to the backend API.');
            }
        }
    </script>
</body>
</html>
